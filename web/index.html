<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ledo — auditoria diária de caixa.">
    <title>Ledo</title>

    <!-- Favicon: SVG quando suportado, PNG fallback (16/32). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">

    <!-- App icon iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2D4A2E">

    <!-- Open Graph (compartilhamento em redes / WhatsApp) -->
    <meta property="og:title" content="Ledo">
    <meta property="og:description" content="Auditoria diária de caixa">
    <meta property="og:image" content="/og-image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ledo.plexalabs.com">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ledo">
    <meta name="twitter:description" content="Auditoria diária de caixa">
    <meta name="twitter:image" content="/og-image.png">

    <!-- Conexão antecipada com o Supabase pra reduzir latência na 1ª request.
         DNS + TCP + TLS handshake já ficam quentes antes do JS pedir. -->
    <link rel="preconnect" href="https://uxgdygrkbvtllaajxzwr.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://uxgdygrkbvtllaajxzwr.supabase.co">

    <!-- Pre-discover do bundle JS (defer descoberta em paralelo ao parse). -->
    <link rel="modulepreload" href="/app/main.js">

    <!-- Google Fonts: Fraunces (display serif) + Manrope (body humanist sans).
         Pesos enxutos — só os que o app usa de verdade. font-display:swap
         garante que o texto aparece logo com fonte fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Manrope:wght@400;600;700&display=swap" media="all">

    <!-- Skeleton crítico inline — pinta o caderno e o nome do app
         INSTANTANEAMENTE (sem esperar bundle/fontes). Some assim que o
         JS escreve em #app. Pesa ~1.5KB no HTML, vale como FCP imediato. -->
    <style>
      :root {
        --boot-bg:    #F5EFE6;
        --boot-card:  #FAF6EF;
        --boot-ink:   #1F1A14;
        --boot-musgo: #2A3D2C;
        --boot-mute:  #6E665B;
      }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--boot-bg);
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: var(--boot-ink);
      }
      .ledo-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1.25rem;
        background: var(--boot-bg);
        z-index: 9999;
        animation: ledo-boot-out 250ms ease-in 5s forwards;
      }
      .ledo-boot__logo {
        width: 56px; height: 56px;
        border-radius: 14px;
        background: var(--boot-card);
        display: grid; place-items: center;
        box-shadow: 0 4px 12px -6px rgba(15,76,58,0.16);
      }
      .ledo-boot__logo svg { width: 36px; height: 36px; }
      .ledo-boot__name {
        font-family: ui-serif, Georgia, 'Times New Roman', serif;
        font-style: italic;
        font-size: 1.65rem;
        color: var(--boot-musgo);
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .ledo-boot__tag {
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--boot-mute);
        font-weight: 600;
      }
      .ledo-boot__pulse {
        width: 36px; height: 2px;
        background: linear-gradient(
          90deg,
          transparent, var(--boot-musgo), transparent
        );
        background-size: 200% 100%;
        animation: ledo-pulse 1.1s ease-in-out infinite;
        border-radius: 1px;
        opacity: 0.65;
      }
      @keyframes ledo-pulse {
        0%, 100% { background-position: 200% 0; }
        50%      { background-position: -200% 0; }
      }
      @keyframes ledo-boot-out {
        to { opacity: 0; visibility: hidden; }
      }
      /* Quando o JS renderiza no #app, esconde o boot. */
      #app:not(:empty) ~ .ledo-boot,
      #app:not(:empty) .ledo-boot { display: none; }
      @media (prefers-reduced-motion: reduce) {
        .ledo-boot__pulse { animation: none; opacity: 0.45; }
      }
    </style>
</head>
