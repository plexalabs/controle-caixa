<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ledo — auditoria diária de caixa.">
    <title>Ledo</title>

    <!-- Favicon: SVG quando suportado, PNG fallback (16/32). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">

    <!-- App icon iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2D4A2E">

    <!-- Open Graph (compartilhamento em redes / WhatsApp) -->
    <meta property="og:title" content="Ledo">
    <meta property="og:description" content="Auditoria diária de caixa">
    <meta property="og:image" content="/og-image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://caixa-boti.plexalabs.com">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ledo">
    <meta name="twitter:description" content="Auditoria diária de caixa">
    <meta name="twitter:image" content="/og-image.png">

    <!-- Google Fonts: Fraunces (display serif) + Manrope (body humanist sans).
         Não-padrão, com personalidade — evita o "AI slop" de Inter/Roboto. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700&display=swap">

    <!-- Tailwind, tokens e components agora sao importados via main.js
         (build pelo Vite + PostCSS). Config em tailwind.config.js. -->
</head>
<body class="bg-papel text-tinta antialiased font-sans">
    <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:bg-musgo focus:text-papel focus:px-3 focus:py-2 focus:rounded-md focus:z-50">
        Pular para o conteúdo
    </a>
    <div id="app" role="main"></div>
    <div id="toast-container" aria-live="polite" aria-atomic="false"
         class="fixed bottom-6 right-6 space-y-2 z-50 max-w-sm"></div>

    <script type="module" src="/app/main.js"></script>
</body>
</html>
